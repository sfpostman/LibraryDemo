$kind: http-request
description: >-
  ### Get Books


  This endpoint retrieves a list of books from the collection. It returns
  various details about each book, including its title, author, genre,
  publication year, and status regarding checkout and permanence in the
  collection.


  #### Request


  - **Method**: GET
      
  - **URL**: `{{url}}/books`
      

  #### Response


  - **Status Code**: 200 OK
      
  - **Content-Type**: application/json
      
  - **Response Body**: An array of book objects, each containing the following
  fields:
      
      - `id`: Unique identifier for the book.
          
      - `title`: Title of the book.
          
      - `author`: Author of the book.
          
      - `genre`: Genre of the book.
          
      - `yearPublished`: The year the book was published.
          
      - `checkedOut`: Boolean indicating if the book is currently checked out.
          
      - `isPermanentCollection`: Boolean indicating if the book is part of the permanent collection.
          
      - `createdAt`: Timestamp of when the book entry was created.

          

  #### Example Response


  ``` json

  [
    {
      "id": "",
      "title": "",
      "author": "",
      "genre": "",
      "yearPublished": 0,
      "checkedOut": true,
      "isPermanentCollection": true,
      "createdAt": ""
    }
  ]

   ```

  #### Notes


  - Ensure that the request is made to the correct endpoint to receive the
  desired book data.
      
  - The response may contain multiple book entries, and each entry will have the
  fields specified above.
url: "{{url}}/books"
method: GET
headers:
  x-mock-response-code: "500"
scripts:
  - type: afterResponse
    code: >-
      
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.eql(200);
      });



      pm.test("Response is an array with at least one book object", function ()
      {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('array').that.is.not.empty;
      });



      pm.test("Each book object has the required fields", function () {
          const responseData = pm.response.json();

          pm.expect(responseData).to.be.an('array');

          responseData.forEach(book => {
              pm.expect(book).to.be.an('object');
              pm.expect(book).to.have.all.keys('id', 'title', 'author', 'genre', 'yearPublished', 'checkedOut', 'isPermanentCollection', 'createdAt');
          });
      });



      pm.test("The title must be a non-empty string", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('array').that.is.not.empty;
          responseData.forEach(book => {
              pm.expect(book.title).to.exist.and.to.be.a('string').and.to.have.lengthOf.at.least(1, "Title should not be empty");
          });
      });


      pm.test('GET /books - Status code is 200', function () {
          pm.response.to.have.status(200);
      })


      pm.test('GET /books - Content-Type is JSON', function () {
          pm.response.to.have.header('Content-Type');
          pm.expect(pm.response.headers.get('Content-Type')).to.match(/application\/json/i);
      })


      pm.test('GET /books - Response is an array of books', function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an('array');
      })


      pm.test('GET /books - Each book has expected fields & types', function ()
      {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an('array');
          jsonData.forEach(function (book) {
              pm.expect(book).to.be.an('object');
              pm.expect(book).to.have.property('id');
              pm.expect(book.id).to.satisfy(function (v) {
                  return typeof v === 'string' || typeof v === 'number';
              });
              pm.expect(book).to.have.property('title');
              pm.expect(book.title).to.be.a('string');
              if (book.hasOwnProperty('author'))
                  pm.expect(book.author).to.be.a('string');
              if (book.hasOwnProperty('genre'))
                  pm.expect(book.genre).to.be.a('string');
              if (book.hasOwnProperty('yearPublished'))
                  pm.expect(book.yearPublished).to.satisfy(function (v) {
                      return typeof v === 'number' || typeof v === 'string';
                  });
              pm.expect(book).to.have.property('checkedOut');
              pm.expect(book.checkedOut).to.be.a('boolean');
              if (book.hasOwnProperty('isPermanentCollection'))
                  pm.expect(book.isPermanentCollection).to.be.a('boolean');
          });
      })


      pm.test('GET /books - Negative check: does not return an error object',
      function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.not.have.property('error');
          pm.expect(jsonData).to.not.have.property('errors');
      })
    language: text/javascript
examples: ./.resources/Fetch a list of books.resources/examples
order: 1000

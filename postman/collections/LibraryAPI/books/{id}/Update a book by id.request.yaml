$kind: http-request
url: "{{baseUrl}}/books/:id"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: 29f47d22-1062-479d-be58-2d8db3ecb8be
    description: (Required) the id of a book
body:
  type: json
  content: |-
    {
      "checkedOut": true
    }
auth:
  type: apikey
  credentials:
    key: api-key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Update a book by id.resources/examples
order: 2000

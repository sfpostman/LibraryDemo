$kind: http-example
request:
  url: "{{baseUrl}}/books/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: id
      value: 29f47d22-1062-479d-be58-2d8db3ecb8be
      description: (Required) the id of a book
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": "error",
        "message": "something"
      }
order: 3000

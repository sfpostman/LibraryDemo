$kind: http-example
request:
  url: "{{baseUrl}}/books/:id"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: api-key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: 29f47d22-1062-479d-be58-2d8db3ecb8be
      description: (Required) the id of a book
  body:
    type: json
    content: |-
      {
        "checkedOut": true
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "body/checkedOut must be boolean",
        "errors": [
          {
            "instancePath": "/checkedOut",
            "schemaPath": "#/properties/checkedOut/type",
            "keyword": "type",
            "params": {
              "type": "boolean"
            },
            "message": "must be boolean"
          }
        ]
      }
order: 2000
